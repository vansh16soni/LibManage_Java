<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account · LibManage</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/style.css(v=4)}">
</head>
<body>

<div class="lm-auth-wrap">
    <div class="lm-auth-card">
        <div class="lm-auth-icon"><i class="bi bi-person-plus"></i></div>
        <h1 class="h3 mb-1">Join the library</h1>
        <p class="text-muted mb-4">Register as a member to start borrowing books.</p>

        <div th:if="${errorMessage}" class="alert alert-danger py-2" th:text="${errorMessage}"></div>

        <form th:action="@{/register}" method="post">
            <div class="mb-3">
                <label class="form-label" for="fullName">Full name</label>
                <input type="text" class="form-control" id="fullName" name="fullName" th:value="${fullName}" required autofocus placeholder="Jane Doe">
            </div>
            <div class="mb-3">
                <label class="form-label" for="email">Email address</label>
                <input type="email" class="form-control" id="email" name="email" th:value="${email}" required placeholder="you@example.com">
            </div>
            <div class="mb-3">
                <label class="form-label" for="password">Password</label>
                <input type="password" class="form-control" id="password" name="password" required minlength="6" placeholder="At least 6 characters">
            </div>
            <div class="mb-3">
                <label class="form-label" for="confirmPassword">Confirm password</label>
                <input type="password" class="form-control" id="confirmPassword" name="confirmPassword" required minlength="6" placeholder="Re-enter password">
            </div>
            <button type="submit" class="btn btn-lm-primary w-100 py-2 mt-2">Create Account</button>
        </form>

        <p class="text-center text-muted mt-4 mb-0">
            Already a member? <a th:href="@{/login}" class="fw-semibold" style="color: var(--lm-navy);">Sign in</a>
        </p>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
