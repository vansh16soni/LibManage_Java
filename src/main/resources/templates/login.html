<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In · LibManage</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/style.css(v=4)}">
</head>
<body>

<div class="lm-auth-wrap">
    <div class="lm-auth-card">
        <div class="lm-auth-icon"><i class="bi bi-book-half"></i></div>
        <h1 class="h3 mb-1">Welcome back</h1>
        <p class="text-muted mb-4">Sign in to your LibManage account.</p>

        <div th:if="${errorMessage}" class="alert alert-danger py-2" th:text="${errorMessage}"></div>
        <div th:if="${successMessage}" class="alert alert-success py-2" th:text="${successMessage}"></div>

        <form th:action="@{/login}" method="post">
            <div class="mb-3">
                <label class="form-label" for="username">Email address</label>
                <input type="email" class="form-control" id="username" name="username" required autofocus placeholder="you@example.com">
            </div>
            <div class="mb-3">
                <label class="form-label" for="password">Password</label>
                <div class="lm-password-field-wrap">
                    <input type="password" class="form-control" id="password" name="password" required placeholder="••••••••">
                    <button class="lm-pw-toggle-btn" type="button" onclick="lmTogglePw()"><i class="bi bi-eye" id="pwIcon"></i></button>
                </div>
            </div>
            <button type="submit" class="btn btn-lm-primary w-100 py-2 mt-2">Sign In</button>
        </form>

        <p class="text-center text-muted mt-4 mb-0">
            New to LibManage? <a th:href="@{/register}" class="fw-semibold" style="color: var(--lm-navy);">Create an account</a>
        </p>

        <div class="mt-3 pt-3 border-top">
            <small class="text-muted d-block">Demo admin: <span class="lm-mono">admin@lib.com</span> / <span class="lm-mono">admin123</span></small>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function lmTogglePw() {
        const input = document.getElementById('password');
        const icon = document.getElementById('pwIcon');
        const isPw = input.type === 'password';
        input.type = isPw ? 'text' : 'password';
        icon.className = isPw ? 'bi bi-eye-slash' : 'bi bi-eye';
    }
</script>
</body>
</html>
